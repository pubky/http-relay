openapi: 3.0.3
info:
  title: pubky-http-relay
  description: |
    An HTTP relay for asynchronous producer/consumer message passing.

    Producers POST data to a channel, consumers GET it. Each party waits
    for their counterpart to arrive. The relay facilitates decoupled
    communication between distributed services.

    **Two endpoint variants are available:**
    - `/link2/{id}` - **Recommended.** Short timeout (25s) with caching (5 min TTL)
    - `/link/{id}` - **Deprecated.** (10 min timeout, no caching)

    **Use `/link2` for new integrations.** The original `/link` endpoint has a
    problem on mobile devices: when an app gets backgrounded or killed while
    waiting, the response never arrives, but the relay considers it consumed.
    `/link2` solves this with caching (retry and still get the value) and a
    shorter timeout that works with proxy timeouts (nginx, Cloudflare use 30s).
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /link/{id}:
    get:
      summary: Consume a message (deprecated)
      deprecated: true
      description: |
        **Deprecated.** Use `/link2` for all integrations.

        Consumer retrieves a message from the channel. Blocks until a producer
        sends data or the timeout (10 minutes) is reached.
      operationId: linkGet
      tags:
        - link
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          $ref: '#/components/responses/MessageReceived'
        '408':
          $ref: '#/components/responses/Timeout'

    post:
      summary: Produce a message (deprecated)
      deprecated: true
      description: |
        **Deprecated.** Use `/link2` for all integrations.

        Producer sends a message to the channel. Blocks until a consumer
        retrieves the data or the timeout (10 minutes) is reached.
      operationId: linkPost
      tags:
        - link
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        $ref: '#/components/requestBodies/Message'
      responses:
        '200':
          $ref: '#/components/responses/MessageDelivered'
        '408':
          $ref: '#/components/responses/Timeout'

  /link2/{id}:
    get:
      summary: Consume a message (recommended)
      description: |
        **Recommended endpoint for new integrations.**

        Consumer retrieves a message from the channel. If a cached response
        exists, returns immediately. Otherwise blocks until a producer sends
        data or the timeout (25 seconds) is reached.

        Cached responses persist for 5 minutes (configurable), enabling
        retries after connection drops (e.g., mobile app backgrounded).
      operationId: link2Get
      tags:
        - link2
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          $ref: '#/components/responses/MessageReceived'
        '408':
          $ref: '#/components/responses/Timeout'

    post:
      summary: Produce a message (recommended)
      description: |
        **Recommended endpoint for new integrations.**

        Producer sends a message to the channel. Invalidates any existing
        cached response. Blocks until a consumer retrieves the data or the
        timeout (25 seconds) is reached.

        After the first consumer retrieves the message, it is cached for
        subsequent consumers (5 minute TTL), enabling retries after connection
        drops (e.g., mobile app backgrounded).
      operationId: link2Post
      tags:
        - link2
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        $ref: '#/components/requestBodies/Message'
      responses:
        '200':
          $ref: '#/components/responses/MessageDelivered'
        '408':
          $ref: '#/components/responses/Timeout'

components:
  parameters:
    channelId:
      name: id
      in: path
      required: true
      description: Unique channel identifier. Producers and consumers using the same ID are paired.
      schema:
        type: string
      example: my-channel

  requestBodies:
    Message:
      description: Message payload to send
      required: true
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
        application/json:
          schema:
            type: object
          example:
            hello: world
        text/plain:
          schema:
            type: string
          example: Hello, world!

  responses:
    MessageReceived:
      description: Message successfully retrieved from producer
      headers:
        Content-Type:
          description: Content-Type from the producer's request (if provided)
          schema:
            type: string
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
        application/json:
          schema:
            type: object
        text/plain:
          schema:
            type: string

    MessageDelivered:
      description: Message successfully delivered to consumer

    Timeout:
      description: Timeout waiting for counterpart (producer or consumer)

tags:
  - name: link
    description: Deprecated relay endpoints (10 min timeout, no caching). Use link2 instead.
  - name: link2
    description: Recommended endpoints with retry support (25s timeout, 5 min cache TTL)
